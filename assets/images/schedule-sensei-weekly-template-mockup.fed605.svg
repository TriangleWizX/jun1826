<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Schedule Sensei Weekly Calendar Mockup</title>
  <desc id="desc">A weekly calendar screenshot mockup with two repeating class events.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbfb"/>
      <stop offset="100%" stop-color="#edf6f5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect x="80" y="64" width="1040" height="632" rx="24" fill="#ffffff" stroke="#d7e4e2"/>
  <text x="120" y="120" fill="#1f1712" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Weekly Plan</text>
  <text x="120" y="156" fill="#4f433c" font-family="Arial, Helvetica, sans-serif" font-size="21">Two repeating classes locked in</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#4f433c" font-weight="700">
    <text x="120" y="214">MON</text>
    <text x="268" y="214">TUE</text>
    <text x="416" y="214">WED</text>
    <text x="564" y="214">THU</text>
    <text x="712" y="214">FRI</text>
    <text x="860" y="214">SAT</text>
    <text x="1008" y="214">SUN</text>
  </g>

  <g stroke="#e7efee">
    <line x1="112" y1="232" x2="1088" y2="232"/>
    <line x1="112" y1="320" x2="1088" y2="320"/>
    <line x1="112" y1="408" x2="1088" y2="408"/>
    <line x1="112" y1="496" x2="1088" y2="496"/>
    <line x1="112" y1="584" x2="1088" y2="584"/>
    <line x1="112" y1="672" x2="1088" y2="672"/>
  </g>
  <g stroke="#e7efee">
    <line x1="252" y1="188" x2="252" y2="672"/>
    <line x1="400" y1="188" x2="400" y2="672"/>
    <line x1="548" y1="188" x2="548" y2="672"/>
    <line x1="696" y1="188" x2="696" y2="672"/>
    <line x1="844" y1="188" x2="844" y2="672"/>
    <line x1="992" y1="188" x2="992" y2="672"/>
  </g>

  <g>
    <rect x="126" y="336" width="248" height="62" rx="12" fill="#289fa1"/>
    <text x="140" y="361" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Schedule Sensei BJJ</text>
    <text x="140" y="385" fill="#dff6f6" font-family="Arial, Helvetica, sans-serif" font-size="14">Adults • 6:00 PM</text>
  </g>
  <g>
    <rect x="422" y="336" width="248" height="62" rx="12" fill="#289fa1"/>
    <text x="436" y="361" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Schedule Sensei BJJ</text>
    <text x="436" y="385" fill="#dff6f6" font-family="Arial, Helvetica, sans-serif" font-size="14">Adults • 6:00 PM</text>
  </g>

  <text x="120" y="720" fill="#4f433c" font-family="Arial, Helvetica, sans-serif" font-size="17">Repeat weekly for 4 weeks, then review.</text>
</svg>
